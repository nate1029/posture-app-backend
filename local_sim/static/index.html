<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posture Observer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0A0A0A;
            --surface: #141414;
            --surface-hover: #1A1A1A;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #FAFAFA;
            --text-muted: #A1A1AA;
            --accent: #E2E8F0;
            --risk-gradient: linear-gradient(135deg, #FF453A, #FF3B30);
            --good-gradient: linear-gradient(135deg, #32D74B, #30D158);
            --warning-gradient: linear-gradient(135deg, #FF9F0A, #FFD60A);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Subtle background glow */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 2.5rem;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 24px 48px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 0 0 2rem 0;
            line-height: 1.5;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }
        
        .input-group:focus-within {
            border-color: rgba(255,255,255,0.2);
        }

        .input-group label {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .input-group input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.2rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            width: 60px;
            text-align: right;
            outline: none;
        }

        .input-group span {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .timer-display {
            font-size: 4rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.04em;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 40px rgba(255,255,255,0.1);
        }

        .status-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2.5rem;
            height: 1.2rem;
        }

        button {
            background: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 100px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255,255,255,0.15);
        }

        button:active {
            transform: translateY(0);
        }

        button.stop {
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        button.stop:hover {
            background: rgba(255,255,255,0.1);
            transform: none;
            box-shadow: none;
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: var(--surface);
            padding: 3rem;
            border-radius: 28px;
            border: 1px solid var(--border);
            text-align: center;
            max-width: 400px;
            transform: scale(0.95) translateY(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 32px 64px rgba(0,0,0,0.6);
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal.risk { border-top: 4px solid #FF3B30; }
        .modal.info { border-top: 4px solid #A1A1AA; }

        .modal-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.5rem auto;
            font-size: 2rem;
        }

        .modal.risk .modal-icon {
            background: rgba(255, 59, 48, 0.1);
            color: #FF3B30;
        }
        
        .modal.info .modal-icon {
            background: rgba(255, 255, 255, 0.05);
            color: #FAFAFA;
        }

        .modal h2 {
            margin: 0 0 1rem 0;
            font-size: 1.5rem;
        }
        
        .modal p {
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 2rem;
        }
        
        .modal button {
            width: auto;
            min-width: 140px;
        }

        /* Pulse animation for checking state */
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        
        .checking {
            animation: pulse 1.5s infinite ease-in-out;
            color: #30D158;
        }

    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div class="container">
        <h1>Observer</h1>
        <p class="subtitle">Continuous background posture evaluation.</p>

        <div id="setup-view">
            <div class="input-group">
                <label for="intervalInput">Check every</label>
                <input type="number" id="intervalInput" value="5" min="1" max="60">
                <span>min</span>
            </div>
            
            <button id="startBtn">Begin Tracking</button>
        </div>

        <div id="tracking-view" style="display: none;">
            <div class="timer-display" id="timerDisplay">05:00</div>
            <div class="status-text" id="statusText">Monitoring Posture</div>
            <button class="stop" id="stopBtn">Stop</button>
        </div>
    </div>

    <!-- Popup Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalBox">
            <div class="modal-icon" id="modalIcon">!</div>
            <h2 id="modalTitle">Alert</h2>
            <p id="modalDesc">Message.</p>
            <button id="modalCloseBtn">Got it</button>
        </div>
    </div>

    <script>
        let intervalTimeS = 0;
        let timeRemainingS = 0;
        let timerId = null;
        let isChecking = false;

        const setupView = document.getElementById('setup-view');
        const trackingView = document.getElementById('tracking-view');
        const intervalInput = document.getElementById('intervalInput');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const timerDisplay = document.getElementById('timerDisplay');
        const statusText = document.getElementById('statusText');
        
        const modalOverlay = document.getElementById('modalOverlay');
        const modalBox = document.getElementById('modalBox');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');
        const modalIcon = document.getElementById('modalIcon');
        const modalCloseBtn = document.getElementById('modalCloseBtn');

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function updateDisplay() {
            timerDisplay.innerText = formatTime(timeRemainingS);
        }

        function startTimer() {
            const mins = parseInt(intervalInput.value);
            if (isNaN(mins) || mins < 1) {
                alert("Please enter a valid number of minutes.");
                return;
            }
            
            intervalTimeS = mins * 60;
            timeRemainingS = intervalTimeS;
            updateDisplay();
            
            setupView.style.display = 'none';
            trackingView.style.display = 'block';
            statusText.innerText = 'Monitoring Posture';
            statusText.className = 'status-text';
            
            timerId = setInterval(tick, 1000);
        }

        function stopTimer() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
            setupView.style.display = 'block';
            trackingView.style.display = 'none';
            isChecking = false;
        }

        async function tick() {
            if (timeRemainingS > 0) {
                timeRemainingS--;
                updateDisplay();
                return;
            }

            // Time is up, freeze timer and check posture
            if (isChecking) return;
            isChecking = true;
            statusText.innerText = 'Checking Camera...';
            statusText.className = 'status-text checking';

            try {
                const res = await fetch('/check_posture');
                const data = await res.json();
                handlePostureResult(data);
            } catch (err) {
                console.error(err);
                showModal('info', 'Error', 'Failed to reach the posture engine. Is the backend running?');
            }

            // Reset loop
            isChecking = false;
            timeRemainingS = intervalTimeS;
            updateDisplay();
            statusText.innerText = 'Monitoring Posture';
            statusText.className = 'status-text';
        }

        function handlePostureResult(data) {
            if (data.status === 'not_found' || data.status === 'error') {
                showModal('info', 'Not Found', 'Posture was not found or camera undetectable. Please check your setup.');
            } else if (data.status === 'success') {
                if (data.state === 'RISK') {
                    showModal('risk', 'Very Bad Posture', 'Please correct your posture immediately.');
                }
                // If GOOD or MODERATE, we ignore it!
                console.log(`Check complete. State: ${data.state}, Score: ${data.score}`);
            }
        }

        function showModal(type, title, desc) {
            modalBox.className = 'modal ' + type;
            modalTitle.innerText = title;
            modalDesc.innerText = desc;
            
            if (type === 'risk') {
                modalIcon.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>`;
            } else {
                modalIcon.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>`;
            }

            modalOverlay.classList.add('active');
        }

        startBtn.addEventListener('click', startTimer);
        stopBtn.addEventListener('click', stopTimer);
        modalCloseBtn.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
        });

    </script>
</body>
</html>
